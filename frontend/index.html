<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to_gcode - Plotter SVG Converter</title>
    <!-- Silenciar error de favicon -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">to_gcode - Plotter SVG</h1>
        
        <div class="row">
            <!-- Configuración -->
            <div class="col-md-6 mb-4">
                <div class="card p-3 shadow-sm">
                    <h3>Configuración de Máquina</h3>
                    <form id="configForm">
                        <div class="mb-2"><input type="text" id="name" class="form-control" placeholder="Nombre" value="plotter_1"></div>
                        <div class="row">
                            <div class="col"><input type="number" id="width" class="form-control" placeholder="Width" value="100"></div>
                            <div class="col"><input type="number" id="height" class="form-control" placeholder="Height" value="100"></div>
                        </div>
                        <div class="row mt-2">
                            <div class="col"><input type="text" id="pen_up" class="form-control" placeholder="Pen Up (M5)" value="M5"></div>
                            <div class="col"><input type="text" id="pen_down" class="form-control" placeholder="Pen Down (M3)" value="M3"></div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Guardar Configuración</button>
                    </form>
                </div>
            </div>
            
            <!-- Conversión -->
            <div class="col-md-6">
                <div class="card p-3 shadow-sm">
                    <h3>Convertir SVG</h3>
                    <div class="mb-3">
                        <input type="url" id="svgUrl" class="form-control mb-2" placeholder="URL del SVG">
                        <button id="convertUrlBtn" class="btn btn-outline-success btn-sm">Convertir desde URL</button>
                    </div>
                    <input type="file" id="svgFile" class="form-control mb-3" accept=".svg">
                    <button id="convertBtn" class="btn btn-success">Convertir y Descargar</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
